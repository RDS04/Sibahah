<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Data Siswa - Admin Sekolah Renang Sibahah</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0A66C2',
                        secondary: '#00A8E8',
                        accent: '#F4A261',
                        darkblue: '#003459',
                        air: '#E6F7FF',
                        success: '#10B981',
                        warning: '#F59E0B',
                        danger: '#EF4444',
                    },
                    fontFamily: {
                        'sans': ['Poppins', 'Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            overflow-x: hidden;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #F3F6F9;
        }

        /* Sidebar transition - mobile optimized */
        .sidebar {
            transition: transform 0.3s ease-in-out;
            z-index: 40;
        }

        .sidebar.closed {
            transform: translateX(-100%);
        }

        @media (max-width: 767px) {
            .sidebar {
                position: fixed;
                width: 80vw !important;
                max-width: 280px;
            }
        }

        @media (min-width: 768px) {
            .sidebar {
                transform: translateX(0) !important;
            }

            .mobile-menu-btn {
                display: none !important;
            }
        }

        .status-active { background: #D1FAE5; color: #059669; }
        .status-pending { background: #FEF3C7; color: #D97706; }
        .table-row-hover:hover { background-color: #F0F9FF; }
        
        .status-badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            min-height: 24px;
            display: inline-flex;
            align-items: center;
            white-space: nowrap;
        }

        /* Table wrapper responsive */
        .table-wrapper {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        @media (max-width: 640px) {
            .table-wrapper {
                border-radius: 0.5rem;
            }

            table {
                font-size: 0.75rem;
            }

            table th, table td {
                padding: 0.5rem;
            }
        }

        /* Modal responsive */
        .modal {
            padding: 1rem;
        }

        @media (min-width: 768px) {
            .modal {
                padding: 2rem;
            }
        }

        /* Fix layout on mobile */
        @media (max-width: 767px) {
            .md\:ml-72 {
                margin-left: 0;
            }

            header {
                padding: 0.75rem 1rem;
            }

            main {
                padding: 1rem;
            }
        }

        @media (min-width: 768px) {
            header {
                padding: 1rem 1.5rem;
            }

            main {
                padding: 1.5rem;
            }
        }

        /* Touch-friendly sizes */
        button, a.btn {
            min-height: 44px;
        }

        /* Prevent iOS zoom */
        input, select, textarea {
            font-size: 16px;
        }
    </style>
</head>
<body class="font-sans antialiased">

                </a>
            </div>

            <div class="mb-6">
                <p class="text-white/40 text-xs uppercase tracking-wider px-3 mb-3">Lainnya</p>

    <!-- MAIN CONTENT -->
    <div class="md:ml-72 min-h-screen">
        <!-- Header Top -->
        <header class="bg-white shadow-sm sticky top-0 z-20">
            <div class="flex items-center justify-between px-6 py-4">
                <div class="flex items-center gap-4">
                    <button id="mobileMenuBtn" class="text-gray-600 hover:text-primary text-2xl md:hidden" onclick="toggleSidebar()">
                        <i class="fas fa-bars"></i>
                    </button>
                    <h2 class="text-xl font-semibold text-darkblue" id="pageTitle">Data Siswa</h2>
                </div>
                <div class="flex items-center gap-4">

                        <i class="fas fa-bell text-gray-500 text-xl cursor-pointer hover:text-primary"></i>
                        <span class="absolute -top-1 -right-2 bg-danger text-white text-[10px] rounded-full px-1.5 py-0.5">0</span>

                    <div class="flex items-center gap-3 border-l pl-4">

                            <p class="text-sm font-semibold text-gray-700">Admin Sibahah</p>

        <!-- Page Content -->
        <main class="p-6">
            <div class="max-w-7xl mx-auto">
            <!-- Content Header -->
            <div class="mb-6">
                <p class="text-gray-600">Kelola data siswa aktif dan alumni</p>
            </div>

            <!-- Tombol Export -->
            <div class="mb-6 flex justify-between items-center flex-wrap gap-3">
                <div class="flex gap-2 flex-wrap">
                    <input type="text" placeholder="Cari nama siswa..." id="searchInput" class="px-4 py-2 border rounded-lg text-sm" onkeyup="filterStudents()">
                    <select id="statusFilter" class="px-4 py-2 border rounded-lg text-sm" onchange="filterStudents()">
                        <option value="">Semua Status</option>
                        <option value="Aktif">Aktif</option>
                        <option value="Nonaktif">Nonaktif</option>
                    </select>
                </div>
                <button onclick="exportStudentData()" class="bg-green-600 text-white px-4 py-2 rounded-lg text-sm hover:bg-green-700">
                    <i class="fas fa-download"></i> Export Excel
                </button>
            </div>

            <!-- Tabel Data Siswa -->
            <div class="bg-white rounded-xl shadow-md overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full">
                        <thead class="bg-gray-100 border-b">
                            <tr>
                                <th class="px-6 py-4 text-left text-sm font-semibold text-gray-700">No</th>
                                <th class="px-6 py-4 text-left text-sm font-semibold text-gray-700">Nama</th>
                                <th class="px-6 py-4 text-left text-sm font-semibold text-gray-700">Orang Tua</th>
                                <th class="px-6 py-4 text-left text-sm font-semibold text-gray-700">No. WA</th>
                                <th class="px-6 py-4 text-left text-sm font-semibold text-gray-700">Kelas</th>
                                <th class="px-6 py-4 text-left text-sm font-semibold text-gray-700">Jadwal</th>
                                <th class="px-6 py-4 text-left text-sm font-semibold text-gray-700">Status</th>

            </div>

    <!-- Edit Student Modal -->
    <div id="editModal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-lg shadow-xl max-w-2xl w-full max-h-[90vh] overflow-y-auto">
            <div class="sticky top-0 bg-gradient-to-r from-orange-500 to-orange-600 text-white p-6 flex items-center justify-between">
                <h2 class="text-2xl font-bold"><i class="fas fa-edit mr-2"></i>Edit Data Siswa</h2>
                <button onclick="closeEditModal()" class="text-white hover:text-gray-200 text-2xl">
                    <i class="fas fa-times"></i>
                </button>
            </div>

            <form onsubmit="event.preventDefault(); saveEditStudent();" class="p-6 space-y-4">
                <input type="hidden" id="editStudentId">
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Nama Siswa *</label>
                        <input type="text" id="editNama" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent" placeholder="Nama lengkap">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Orang Tua *</label>
                        <input type="text" id="editOrtu" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent" placeholder="Nama orang tua">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">No. WhatsApp *</label>
                        <input type="text" id="editWA" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent" placeholder="Nomor WA">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Email</label>
                        <input type="email" id="editEmail" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent" placeholder="Email">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Kelas *</label>
                        <input type="text" id="editKelas" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent" placeholder="Kelas">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Jadwal *</label>
                        <input type="text" id="editJadwal" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent" placeholder="Jadwal">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Jenis Kelamin</label>
                        <select id="editGender" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent">
                            <option value="">Pilih</option>
                            <option value="Putra">Putra</option>
                            <option value="Putri">Putri</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Usia</label>
                        <input type="number" id="editUsia" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent" placeholder="Usia">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Catatan</label>
                    <textarea id="editCatatan" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent" placeholder="Catatan tambahan" rows="3"></textarea>
                </div>

                <div class="flex gap-3 justify-end pt-6 border-t">
                    <button type="button" onclick="closeEditModal()" class="px-6 py-2 bg-gray-300 text-gray-800 rounded-lg hover:bg-gray-400 font-semibold">
                        Batal
                    </button>
                    <button type="submit" class="px-6 py-2 bg-orange-600 text-white rounded-lg hover:bg-orange-700 font-semibold">
                        <i class="fas fa-save mr-2"></i>Simpan Perubahan
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let studentsData = [];

        // Fetch data dari API
        async function fetchStudentsData() {
            try {
                const response = await fetch('/api/students');
                const result = await response.json();
                
                if (result.success) {
                    studentsData = result.data;
                    console.log('Data siswa loaded:', studentsData);
                    renderStudentsTable();
                } else {
                    console.error('Error:', result.message);
                    showError('Gagal memuat data siswa');
                }
            } catch (error) {
                console.error('Fetch error:', error);
                showError('Error saat memuat data dari server');
            }
        }

        function getStatusBadgeClass(status) {
            if (status === 'SUDAH_BAYAR') return 'status-active';
            return 'status-pending';
        }

        function getStatusDisplay(status) {
            if (status === 'SUDAH_BAYAR') return 'Lunas';
            return 'Belum Bayar';
        }

        function renderStudentsTable() {
            const tbody = document.getElementById('studentsTableBody');
            
            if (studentsData.length === 0) {
                tbody.innerHTML = `<tr><td colspan="8" class="px-6 py-4 text-center text-gray-500">Tidak ada data siswa</td></tr>`;
                return;
            }

            tbody.innerHTML = studentsData.map((s, idx) => `
                <tr class="table-row-hover border-b hover:bg-gray-50 transition">
                    <td class="px-6 py-3 text-sm">${idx + 1}</td>
                    <td class="px-6 py-3 font-medium text-gray-900">${s.nama || '-'}</td>
                    <td class="px-6 py-3 text-sm text-gray-700">${s.ortu || '-'}</td>
                    <td class="px-6 py-3 text-sm text-gray-700">${s.wa || '-'}</td>
                    <td class="px-6 py-3 text-sm text-gray-700">${s.kelas || '-'}</td>
                    <td class="px-6 py-3 text-sm text-gray-700">${s.jadwal || '-'}</td>
                    <td class="px-6 py-3">
                        <span class="inline-block px-3 py-1 rounded-full text-xs font-semibold ${getStatusBadgeClass(s.status_pembayaran)}">
                            ${getStatusDisplay(s.status_pembayaran)}
                        </span>
                    </td>
                    <td class="px-6 py-3 text-sm space-x-1">
                        <button onclick="viewDetail(${s.id})" class="text-blue-600 hover:text-blue-800 px-2 py-1" title="Detail"><i class="fas fa-eye"></i></button>
                        <button onclick="openEditModal(${s.id})" class="text-orange-600 hover:text-orange-800 px-2 py-1" title="Edit"><i class="fas fa-edit"></i></button>
                        <button onclick="deleteStudent(${s.id})" class="text-red-600 hover:text-red-800 px-2 py-1" title="Hapus"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        function filterStudents() {
            const searchValue = document.getElementById('searchInput').value.toLowerCase();
            const statusValue = document.getElementById('statusFilter').value;
            
            const filtered = studentsData.filter(s => {
                const matchSearch = s.nama?.toLowerCase().includes(searchValue) || s.ortu?.toLowerCase().includes(searchValue);
                const matchStatus = !statusValue || getStatusDisplay(s.status_pembayaran) === statusValue;
                return matchSearch && matchStatus;
            });

            const tbody = document.getElementById('studentsTableBody');
            
            if (filtered.length === 0) {
                tbody.innerHTML = `<tr><td colspan="8" class="px-6 py-4 text-center text-gray-500">Tidak ada data yang cocok</td></tr>`;
                return;
            }

            tbody.innerHTML = filtered.map((s, idx) => `
                <tr class="table-row-hover border-b hover:bg-gray-50 transition">
                    <td class="px-6 py-3 text-sm">${idx + 1}</td>
                    <td class="px-6 py-3 font-medium text-gray-900">${s.nama || '-'}</td>
                    <td class="px-6 py-3 text-sm text-gray-700">${s.ortu || '-'}</td>
                    <td class="px-6 py-3 text-sm text-gray-700">${s.wa || '-'}</td>
                    <td class="px-6 py-3 text-sm text-gray-700">${s.kelas || '-'}</td>
                    <td class="px-6 py-3 text-sm text-gray-700">${s.jadwal || '-'}</td>
                    <td class="px-6 py-3">
                        <span class="inline-block px-3 py-1 rounded-full text-xs font-semibold ${getStatusBadgeClass(s.status_pembayaran)}">
                            ${getStatusDisplay(s.status_pembayaran)}
                        </span>
                    </td>
                    <td class="px-6 py-3 text-sm space-x-1">
                        <button onclick="viewDetail(${s.id})" class="text-blue-600 hover:text-blue-800 px-2 py-1" title="Detail"><i class="fas fa-eye"></i></button>
                        <button onclick="openEditModal(${s.id})" class="text-orange-600 hover:text-orange-800 px-2 py-1" title="Edit"><i class="fas fa-edit"></i></button>
                        <button onclick="deleteStudent(${s.id})" class="text-red-600 hover:text-red-800 px-2 py-1" title="Hapus"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        function viewDetail(id) {
            const student = studentsData.find(s => s.id === id);
            if (!student) {
                alert('Data siswa tidak ditemukan');
                return;
            }
            window.open(`/admin/student-detail?id=${id}`, '_blank');
        }

        function openEditModal(id) {
            const student = studentsData.find(s => s.id === id);
            if (!student) {
                alert('Data siswa tidak ditemukan');
                return;
            }
            
            // Populate form dengan data siswa
            document.getElementById('editStudentId').value = student.id;
            document.getElementById('editNama').value = student.nama || '';
            document.getElementById('editOrtu').value = student.ortu || '';
            document.getElementById('editWA').value = student.wa || '';
            document.getElementById('editEmail').value = student.email || '';
            document.getElementById('editKelas').value = student.kelas || '';
            document.getElementById('editJadwal').value = student.jadwal || '';
            document.getElementById('editGender').value = student.gender || '';
            document.getElementById('editUsia').value = student.usia || '';
            document.getElementById('editCatatan').value = student.catatan || '';
            
            // Show modal
            document.getElementById('editModal').classList.remove('hidden');
            document.getElementById('editModal').classList.add('flex');
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.add('hidden');
            document.getElementById('editModal').classList.remove('flex');
        }

        async function saveEditStudent() {
            const id = document.getElementById('editStudentId').value;
            const formData = {
                nama: document.getElementById('editNama').value,
                ortu: document.getElementById('editOrtu').value,
                wa: document.getElementById('editWA').value,
                email: document.getElementById('editEmail').value,
                kelas: document.getElementById('editKelas').value,
                jadwal: document.getElementById('editJadwal').value,
                gender: document.getElementById('editGender').value,
                usia: document.getElementById('editUsia').value,
                catatan: document.getElementById('editCatatan').value
            };

            try {
                const response = await fetch(`/api/students/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });

                const result = await response.json();
                if (result.success) {
                    alert('✓ Data siswa berhasil diperbarui');
                    closeEditModal();
                    fetchStudentsData();
                } else {
                    alert('❌ Gagal update: ' + result.message);
                }
            } catch (error) {
                console.error('Error:', error);
                alert('❌ Terjadi kesalahan saat update data');
            }
        }

        function deleteStudent(id) {
            const student = studentsData.find(s => s.id === id);
            if (!student) {
                alert('Data siswa tidak ditemukan');
                return;
            }

            if (confirm(`Apakah Anda yakin ingin menghapus data ${student.nama}?\n\nTindakan ini tidak dapat dibatalkan.`)) {
                deleteConfirmed(id, student.nama);
            }
        }

        async function deleteConfirmed(id, nama) {
            try {
                const response = await fetch(`/api/students/${id}`, {
                    method: 'DELETE'
                });

                const result = await response.json();
                if (result.success) {
                    alert(`✓ Data siswa "${nama}" berhasil dihapus`);
                    fetchStudentsData();
                } else {
                    alert('❌ Gagal hapus: ' + result.message);
                }
            } catch (error) {
                console.error('Error:', error);
                alert('❌ Terjadi kesalahan saat menghapus data');
            }
        }

        function exportStudentData() {
            if (studentsData.length === 0) {
                alert('Tidak ada data untuk diexport');
                return;
            }
            
            let csv = "No,Nama,Orang Tua,No WA,Kelas,Jadwal,Gender,Usia,Status Pembayaran,Email,Tanggal Daftar\n";
            studentsData.forEach((s, idx) => {
                csv += `${idx + 1},"${s.nama || '-'}","${s.ortu || '-'}","${s.wa || '-'}","${s.kelas || '-'}","${s.jadwal || '-'}","${s.gender || '-'}","${s.usia || '-'}","${getStatusDisplay(s.status_pembayaran)}","${s.email || '-'}","${s.tanggal_daftar || '-'}"\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            link.setAttribute('href', url);
            link.setAttribute('download', `data_siswa_${new Date().toISOString().split('T')[0]}.csv`);
            link.click();
        }

        function showError(message) {
            const tbody = document.getElementById('studentsTableBody');
            tbody.innerHTML = `<tr><td colspan="8" class="px-6 py-4 text-center text-red-500">❌ ${message}</td></tr>`;
        }

        // Sidebar functions
        function closeSidebar() {
            document.getElementById('sidebar').classList.add('closed');
            document.getElementById('mobileOverlay').classList.add('hidden');
        }
        function openSidebar() {
            document.getElementById('sidebar').classList.remove('closed');
            document.getElementById('mobileOverlay').classList.remove('hidden');
        }
        function toggleSidebar() {
            if (document.getElementById('sidebar').classList.contains('closed')) {
                openSidebar();
            } else {
                closeSidebar();
            }
        }
        window.closeSidebar = closeSidebar;
        window.toggleSidebar = toggleSidebar;

        // Set active nav
        function setActiveNav(pageId) {
            document.querySelectorAll('.nav-link').forEach(link => {
                link.classList.remove('bg-primary/30', 'text-white');
                link.classList.add('text-white/80');
            });
            const activeLink = document.querySelector(`.nav-link[data-page="${pageId}"]`);
            if (activeLink) {
                activeLink.classList.add('bg-primary/30', 'text-white');
            }
        }

        // Load data saat halaman dibuka
        document.addEventListener('DOMContentLoaded', () => {
            fetchStudentsData();
            setActiveNav('students');
            document.querySelectorAll('.nav-link').forEach(link => {
                link.addEventListener('click', () => { if (window.innerWidth < 768) closeSidebar(); });
            });
        });
    </script>
</body>
