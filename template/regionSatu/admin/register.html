<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Register - Sekolah Renang Sibahah</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0A66C2',
                        secondary: '#00A8E8',
                        accent: '#F4A261',
                        darkblue: '#003459',
                        air: '#E6F7FF',
                        success: '#10B981',
                        danger: '#EF4444',
                    },
                    fontFamily: {
                        'sans': ['Poppins', 'Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            overflow-x: hidden;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #003459 0%, #0A66C2 50%, #00A8E8 100%);
            min-height: 100vh;
        }
        
        .card-glass {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border-radius: 1.5rem sm:rounded-2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        
        .input-field {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.75rem;
            border: 2px solid #E5E7EB;
            border-radius: 0.75rem sm:rounded-1rem;
            font-size: 16px;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
        }
        
        .input-field:focus {
            outline: none;
            border-color: #0A66C2;
            box-shadow: 0 0 0 3px rgba(10, 102, 194, 0.1);
            background-color: #F0F9FF;
        }
        .input-icon {
            position: relative;
        }
        .input-icon i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #0A66C2;
            font-size: 1.1rem;
        }
        .btn-gradient {
            background: linear-gradient(95deg, #0A66C2 0%, #00A8E8 100%);
            transition: all 0.2s;
        }
        .btn-gradient:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 20px -5px rgba(10, 102, 194, 0.4);
        }
        .error-message {
            font-size: 0.75rem;
            color: #EF4444;
            margin-top: 0.25rem;
            display: none;
        }
        .error-message.show {
            display: block;
        }
        .success-message {
            background: #D1FAE5;
            color: #059669;
            padding: 0.75rem;
            border-radius: 0.75rem;
            font-size: 0.875rem;
            margin-bottom: 1rem;
            display: none;
        }
        .success-message.show {
            display: block;
        }
        .toast-notification {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: #10B981;
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 0.75rem;
            font-size: 0.875rem;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }
        .toast-notification.show {
            opacity: 1;
        }
        .wave-bg {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            pointer-events: none;
            opacity: 0.1;
        }
        .link-login {
            color: #0A66C2;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }
        .link-login:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body class="flex items-center justify-center p-5">
    <!-- Background Wave -->
    <div class="wave-bg">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320">
            <path fill="#ffffff" fill-opacity="0.3" d="M0,192L48,186.7C96,181,192,171,288,176C384,181,480,203,576,213.3C672,224,768,224,864,208C960,192,1056,160,1152,149.3C1248,139,1344,149,1392,154.7L1440,160L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path>
        </svg>
    </div>

    <!-- Main Container -->
    <div class="w-full max-w-md">
        <!-- Logo & Brand -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-white/20 backdrop-blur rounded-full shadow-lg mb-4">
                <i class="fas fa-water text-white text-4xl"></i>
            </div>
            <h1 class="text-3xl font-bold text-white">Sekolah Renang</h1>
            <p class="text-white/80 text-sm mt-1">Sibahah | Bisa, Yakin, Mampu</p>
        </div>

        <!-- Card Register -->
        <div class="card-glass p-6 md:p-8">
            <!-- Header -->
            <div class="mb-6 text-center border-b pb-4">
                <h2 class="text-2xl font-bold text-gray-800">
                    <i class="fas fa-user-plus text-primary mr-2"></i>Buat Akun Baru
                </h2>
                <p class="text-gray-600 text-sm mt-2">Daftar untuk mengakses admin panel</p>
            </div>

            <!-- Success Message -->
            <div id="successMessage" class="success-message">
                <i class="fas fa-check-circle mr-2"></i>
                <span id="successText"></span>
            </div>

            <!-- FORM REGISTER -->
            <form action="/admin/register" method="POST">
                <div class="mb-5">
                    <label class="block text-gray-700 font-semibold mb-2 text-sm">Username</label>
                    <div class="input-icon">
                        <i class="fas fa-user"></i>
                        <input type="text" id="regUsername" name="username" class="input-field" placeholder="Buat username (min. 3 karakter)" autocomplete="off" required>
                    </div>
                    <div id="regUsernameError" class="error-message"></div>
                </div>

                <div class="mb-5">
                    <label class="block text-gray-700 font-semibold mb-2 text-sm">Password</label>
                    <div class="input-icon">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="regPassword" name="password" class="input-field" placeholder="Buat password (min. 4 karakter)" autocomplete="new-password" required>
                    </div>
                    <div id="regPasswordError" class="error-message"></div>
                </div>

                <div class="mb-6">
                    <label class="block text-gray-700 font-semibold mb-2 text-sm">Konfirmasi Password</label>
                    <div class="input-icon">
                        <i class="fas fa-check-circle"></i>
                        <input type="password" id="regConfirmPassword" name="confirm_password" class="input-field" placeholder="Ulangi password" required>
                    </div>
                    <div id="regConfirmError" class="error-message"></div>
                </div>

                <button type="submit" class="btn-gradient w-full text-white font-bold py-3 rounded-xl text-lg transition-all shadow-lg">
                    <i class="fas fa-user-plus mr-2"></i>Daftar Sekarang
                </button>
            </form>

            <!-- Login Link -->
            <div class="text-center mt-6 text-sm text-gray-600">
                Sudah punya akun? <a href="/admin/login" class="link-login"><i class="fas fa-sign-in-alt mr-1"></i>Login di sini</a>
            </div>
        </div>

        <!-- Footer Info -->
        <div class="text-center mt-6 text-white/60 text-xs">
            <i class="fas fa-copyright"></i> 2026 Sekolah Renang Sibahah
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast-notification">
        <i class="fas fa-circle-info mr-2"></i>
        <span id="toastText"></span>
    </div>
</body>
</html>
